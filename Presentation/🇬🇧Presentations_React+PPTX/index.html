<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Incidents in Financial Services — Presentation</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #040508;
      --surface: #080c10;
      --surface2: #0d1420;
      --teal: #00d4c8;
      --teal-dim: #00a89e;
      --teal-glow: rgba(0,212,200,0.15);
      --teal-border: rgba(0,212,200,0.25);
      --white: #ffffff;
      --white-80: rgba(255,255,255,0.80);
      --white-50: rgba(255,255,255,0.50);
      --white-20: rgba(255,255,255,0.12);
      --font-display: 'Syne', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    /* ── Grid noise texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,212,200,0.08) 0%, transparent 60%);
      z-index: 0;
    }

    /* ── Nav ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(4,5,8,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--teal-border);
      z-index: 100;
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--teal);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .nav-dots {
      display: flex; gap: 10px;
    }
    .nav-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--white-20);
      border: none; cursor: pointer;
      transition: all 0.3s ease;
    }
    .nav-dot.active { background: var(--teal); box-shadow: 0 0 10px var(--teal); }
    .nav-counter {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--white-50);
    }

    /* ── Slide base ── */
    .slide {
      min-height: 100vh;
      padding: 120px 80px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
      border-bottom: 1px solid var(--white-20);
    }

    .slide-number {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--teal);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .slide-number::after {
      content: ''; flex: 1; max-width: 60px;
      height: 1px; background: var(--teal-dim);
    }

    /* ── Typography ── */
    .headline {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.02em;
      color: var(--white);
    }
    .headline .accent { color: var(--teal); }

    .subline {
      font-size: clamp(1rem, 1.8vw, 1.3rem);
      color: var(--white-80);
      line-height: 1.65;
      max-width: 680px;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--teal);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Cards ── */
    .card {
      background: rgba(13,20,32,0.8);
      border: 1px solid var(--teal-border);
      border-radius: 16px;
      padding: 28px 32px;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      border-color: var(--teal);
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,212,200,0.1);
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--teal);
      margin-bottom: 12px;
    }
    .card-body {
      font-size: 0.9rem;
      color: var(--white-80);
      line-height: 1.7;
    }

    /* ── Grid layouts ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; }
    .grid-5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 16px; }

    /* ── KPI block ── */
    .kpi {
      text-align: center;
      background: rgba(0,212,200,0.04);
      border: 1px solid var(--teal-border);
      border-radius: 16px;
      padding: 32px 20px;
      transition: all 0.3s;
    }
    .kpi:hover { background: rgba(0,212,200,0.08); transform: translateY(-3px); }
    .kpi-value {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 800;
      color: var(--teal);
      line-height: 1;
    }
    .kpi-label {
      font-size: 0.75rem;
      color: var(--white-50);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 8px;
    }

    /* ── Pipeline ── */
    .pipeline {
      display: flex; align-items: stretch; gap: 0;
      margin: 32px 0;
    }
    .pipe-step {
      flex: 1;
      background: rgba(13,20,32,0.9);
      border: 1px solid var(--teal-border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      position: relative;
      transition: all 0.3s;
    }
    .pipe-step:hover { border-color: var(--teal); background: rgba(0,212,200,0.06); }
    .pipe-step + .pipe-step { margin-left: 8px; }
    .pipe-step + .pipe-step::before {
      content: '→';
      position: absolute; left: -16px; top: 50%;
      transform: translateY(-50%);
      color: var(--teal);
      font-size: 1.1rem;
      z-index: 2;
    }
    .pipe-nb {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--teal);
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }
    .pipe-title {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }
    .pipe-desc { font-size: 0.75rem; color: var(--white-50); line-height: 1.5; }
    .pipe-out {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--white-20);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--teal-dim);
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,212,200,0.1);
      border: 1px solid var(--teal-border);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      color: var(--teal);
    }
    .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }

    /* ── Comparison table ── */
    .compare-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
    .compare-table th {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--teal);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 16px;
      border-bottom: 1px solid var(--teal-border);
      text-align: left;
    }
    .compare-table td {
      padding: 14px 16px;
      font-size: 0.88rem;
      color: var(--white-80);
      border-bottom: 1px solid var(--white-20);
      vertical-align: middle;
    }
    .compare-table tr:hover td { background: rgba(0,212,200,0.03); }
    .compare-table .winner { color: var(--teal); font-weight: 600; }
    .compare-table .rank1::before {
      content: '🥇 '; 
    }

    /* ── Code block ── */
    .code-block {
      background: rgba(4,5,8,0.9);
      border: 1px solid var(--teal-border);
      border-radius: 12px;
      padding: 24px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: #c8f8f5;
      line-height: 1.7;
      overflow-x: auto;
    }
    .code-block .comment { color: var(--white-50); }
    .code-block .keyword { color: #ff79c6; }
    .code-block .string { color: #f1fa8c; }
    .code-block .function { color: var(--teal); }

    /* ── Flow diagram ── */
    .flow { display: flex; flex-direction: column; gap: 12px; }
    .flow-row { display: flex; align-items: center; gap: 12px; }
    .flow-box {
      background: rgba(13,20,32,0.9);
      border: 1px solid var(--teal-border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.85rem;
      color: var(--white-80);
      white-space: nowrap;
    }
    .flow-arrow { color: var(--teal); font-size: 1.2rem; }

    /* ── Roadmap ── */
    .roadmap-item {
      display: flex; gap: 20px; align-items: flex-start;
      padding: 20px 0;
      border-bottom: 1px solid var(--white-20);
    }
    .roadmap-item:last-child { border-bottom: none; }
    .roadmap-dot {
      width: 12px; height: 12px; min-width: 12px;
      border-radius: 50%;
      background: var(--teal);
      margin-top: 4px;
      box-shadow: 0 0 8px var(--teal);
    }
    .roadmap-dot.dim { background: var(--white-20); box-shadow: none; }
    .roadmap-title { font-weight: 600; color: var(--white); margin-bottom: 4px; }
    .roadmap-desc { font-size: 0.85rem; color: var(--white-50); line-height: 1.6; }

    /* ── Hero bg effect ── */
    .hero-glow {
      position: absolute; right: -5%; top: 10%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,212,200,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Gradient line ── */
    .gradient-line {
      height: 2px;
      background: linear-gradient(90deg, var(--teal) 0%, transparent 100%);
      margin: 20px 0;
      max-width: 300px;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,200,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(0,212,200,0); }
    }
    .animate { animation: fadeUp 0.7s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }

    /* ── Footer ── */
    .slide-footer {
      position: absolute; bottom: 30px; right: 80px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--white-20);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Scroll hint ── */
    .scroll-hint {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--white-50);
      letter-spacing: 0.2em;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: fadeUp 1s ease 1s both;
      pointer-events: none;
    }
    .scroll-arrow {
      width: 20px; height: 20px;
      border-right: 1.5px solid var(--teal);
      border-bottom: 1.5px solid var(--teal);
      transform: rotate(45deg);
      animation: scrollBounce 1.5s ease infinite;
    }
    @keyframes scrollBounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50%       { transform: rotate(45deg) translateY(5px); }
    }

    @media (max-width: 900px) {
      .slide { padding: 100px 24px 60px; }
      .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr; }
      .pipeline { flex-direction: column; }
      .pipe-step + .pipe-step { margin-left: 0; margin-top: 20px; }
      .pipe-step + .pipe-step::before { content: '↓'; left: 50%; top: -14px; transform: translateX(-50%); }
      .nav { padding: 16px 24px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SLIDES = [
  { id: 'hero', label: 'INTRO' },
  { id: 'problem', label: 'PROBLEM' },
  { id: 'solution', label: 'SOLUTION' },
  { id: 'data', label: 'DATA' },
  { id: 'pipeline', label: 'PIPELINE' },
  { id: 'ml', label: 'ML' },
  { id: 'api', label: 'API' },
  { id: 'groq', label: 'GROQ' },
  { id: 'architecture', label: 'ARCHITECTURE' },
  { id: 'deploy', label: 'DEPLOY' },
  { id: 'roadmap', label: 'ROADMAP' },
  { id: 'conclusion', label: 'CONCLUSION' },
];

function Nav({ active, onDot }) {
  return (
    <nav className="nav">
      <div className="nav-logo">AI · Fin · Risk</div>
      <div className="nav-dots">
        {SLIDES.map((s, i) => (
          <button
            key={s.id}
            className={`nav-dot ${active === i ? 'active' : ''}`}
            onClick={() => onDot(s.id)}
            title={s.label}
          />
        ))}
      </div>
      <div className="nav-counter">
        {String(active + 1).padStart(2, '0')} / {String(SLIDES.length).padStart(2, '0')}
      </div>
    </nav>
  );
}

function SlideNum({ n, label }) {
  return (
    <div className="slide-number animate">
      <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--teal)' }}>
        {String(n).padStart(2, '0')}
      </span>
      <span style={{ color: 'var(--white-50)' }}>{label}</span>
    </div>
  );
}

/* ── SLIDE 1: HERO ── */
function SlideHero() {
  return (
    <div id="hero" className="slide" style={{ justifyContent: 'flex-end', paddingBottom: '120px' }}>
      <div className="hero-glow" />
      <SlideNum n={1} label="INTRODUCTION" />
      <div className="animate delay-1" style={{ marginBottom: 8 }}>
        <span className="section-label">PUC-SP · Capstone Project · 5th Semester · 2026</span>
      </div>
      <h1 className="headline animate delay-2" style={{ marginBottom: 24, maxWidth: 900 }}>
        AI Incidents in<br />
        <span className="accent">Financial Services</span>
      </h1>
      <div className="gradient-line animate delay-3" />
      <p className="subline animate delay-3">
        Analysis of algorithmic bias, operational risk, and AI governance in financial
        services — end-to-end CRISP-DM pipeline with REST API, interactive dashboard,
        and Groq chatbot.
      </p>
      <div className="badge-row animate delay-4">
        {['CRISP-DM','XGBoost','Flask','Streamlit','SQLite','Groq llama-3.1','Python 3.10+'].map(b => (
          <span key={b} className="badge">{b}</span>
        ))}
      </div>
      <div className="slide-footer">AI · FIN · RISK · 2026</div>
    </div>
  );
}

/* ── SLIDE 2: PROBLEM ── */
function SlideProblem() {
  const problems = [
    { icon: '⚠️', title: 'Flash Crash 2010', desc: '~$1 trillion lost in minutes due to a flawed trading algorithm' },
    { icon: '⚖️', title: 'Credit Bias', desc: 'Apple Card discriminated against women in credit limits — SEC/FTC case' },
    { icon: '🏛️', title: 'MiDAS Michigan', desc: '40,000 false fraud accusations issued by an automated system' },
    { icon: '🔒', title: 'Regulatory Gap', desc: 'Governance responses fail to keep pace with incident severity' },
    { icon: '🌐', title: 'Scattered Data', desc: 'Unstructured, non-standardized incidents, hard to monitor' },
    { icon: '📉', title: 'No Prediction', desc: 'No public tool available to predict severity before a crisis' },
  ];
  return (
    <div id="problem" className="slide">
      <SlideNum n={2} label="PROBLEM" />
      <h2 className="headline animate delay-1" style={{ fontSize: 'clamp(2rem,4vw,3.5rem)', marginBottom: 16 }}>
        The Problem We<br />
        <span className="accent">Want to Solve</span>
      </h2>
      <p className="subline animate delay-2" style={{ marginBottom: 40 }}>
        AI failures in financial services generate billions in losses — but data
        remains scattered, unstructured, and lacks systematic analysis.
      </p>
      <div className="grid-3 animate delay-3">
        {problems.map(p => (
          <div key={p.title} className="card">
            <div style={{ fontSize: '2rem', marginBottom: 12 }}>{p.icon}</div>
            <div className="card-title">{p.title}</div>
            <div className="card-body">{p.desc}</div>
          </div>
        ))}
      </div>
      <div className="slide-footer">AI · FIN · RISK · 2026</div>
    </div>
  );
}

/* ── SLIDE 3: SOLUTION ── */
function SlideSolution() {
  const deliverables = [
    { nb: 'NB1', icon: '📊', title: 'Analytical Base', desc: '31 filtered financial incidents, 8 derived variables, relational SQLite DB' },
    { nb: 'NB2', icon: '📈', title: 'Statistical Analysis', desc: 'H1–H4 formalized: chi-square, Spearman, logistic regression with Odds Ratio' },
    { nb: 'NB3', icon: '🤖', title: 'ML Models', desc: 'Logistic Regression + Random Forest + XGBoost serialized and ready for serving' },
    { nb: 'NB4', icon: '🚀', title: 'API RESTful', desc: '9 Flask endpoints: historical data, aggregated stats, and real-time predictions' },
    { nb: 'APP', icon: '🖥️', title: 'Dashboard', desc: '7 Streamlit pages with dark mode, interactive Plotly, and integrated Groq chatbot' },
  ];
  return (
    <div id="solution" className="slide">
      <SlideNum n={3} label="SOLUTION" />
      <h2 className="headline animate delay-1" style={{ fontSize: 'clamp(2rem,4vw,3.5rem)', marginBottom: 16 }}>
        Pipeline <span className="accent">CRISP-DM</span><br />
        End-to-End
      </h2>
      <p className="subline animate delay-2" style={{ marginBottom: 40 }}>
        From raw data collection to smart chatbot — integrated data science,
        engineering, and visualization architecture.
      </p>
      <div className="grid-5 animate delay-3">
        {deliverables.map(d => (
          <div key={d.nb} className="card" style={{ textAlign: 'center', padding: '24px 16px' }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: '0.65rem', color: 'var(--teal)', marginBottom: 10, letterSpacing: '0.15em' }}>{d.nb}</div>
            <div style={{ fontSize: '2.2rem', marginBottom: 12 }}>{d.icon}</div>
            <div className="card-title" style={{ fontSize: '0.95rem' }}>{d.title}</div>
            <div className="card-body" style={{ fontSize: '0.8rem' }}>{d.desc}</div>
          </div>
        ))}
      </div>
      <div className="slide-footer">AI · FIN · RISK · 2026</div>
    </div>
  );
}

/* ── SLIDE 4: DATA ── */
function SlideData() {
  const kpis = [
    { value: '31', label: 'Financial Incidents' },
    { value: '2003', label: 'Series Start' },
    { value: '2023', label: 'Series End' },
    { value: '8', label: 'Derived Variesbles' },
    { value: '3', label: 'SQLite Tables' },
    { value: '30+', label: 'Financial Keywords' },
  ];
  const vars = [
    { name: 'application_type', type: 'Categorical', classes: 7, desc: 'credit_scoring, fraud_detection, trading...' },
    { name: 'incident_type', type: 'Categorical', classes: 6, desc: 'bias, operational_failure, market_disruption...' },
    { name: 'customer_segment', type: 'Categorical', classes: 5, desc: 'retail, underserved, corporate, sme...' },
    { name: 'severity_level', type: 'Ordinal', classes: 4, desc: 'low → medium → high → critical' },
    { name: 'regulatory_investigation', type: 'Binary', classes: 2, desc: 'formal investigation occurred' },
    { name: 'fine_imposed', type: 'Binary', classes: 2, desc: 'fine or sanction applied' },
    { name: 'policy_change', type: 'Binary', classes: 2, desc: 'policy/system change' },
    { name: 'third_party_audit', type: 'Binary', classes: 2, desc: 'independent audit' },
  ];
  return (
    <div id="data" className="slide">
      <SlideNum n={4} label="DATA" />
      <h2 className="headline animate delay-1" style={{ fontSize: 'clamp(2rem,4vw,3.5rem)', marginBottom: 32 }}>
        Feature <span className="accent">Engineering</span><br />
        via Semantic Inference
      </h2>
      <div className="grid-3 animate delay-2" style={{ gap: 16, marginBottom: 32 }}>
        {kpis.map(k => <div key={k.label} className="kpi"><div className="kpi-value">{k.value}</div><div className="kpi-label">{k.label}</div></div>)}
      </div>
      <div className="animate delay-3" style={{ overflowX: 'auto' }}>
        <table className="compare-table">
          <thead>
            <tr><th>Variesble</th><th>Type</th><th>Classes</th><th>Example Categories</th></tr>
          </thead>
          <tbody>
            {vars.map(v => (
              <tr key={v.name}>
                <td><code style={{ fontFamily: 'var(--font-mono)', color: 'var(--teal)', fontSize: '0.82rem' }}>{v.name}</code></td>
                <td>{v.type}</td>
                <td style={{ textAlign: 'center', color: 'var(--teal)' }}>{v.classes}</td>

        <p style={{ fontFamily: 'var(--font-mono)', fontSize: '0.75rem', color: 'var(--teal)', letterSpacing: '0.2em', marginBottom: 8 }}>PUC-SP · CAPSTONE PROJECT · 5TH SEMESTER · 2026</p>
        <p style={{ fontFamily: 'var(--font-mono)', fontSize: '0.65rem', color: 'var(--white-20)', letterSpacing: '0.15em' }}>CRISP-DM · PYTHON · FLASK · STREAMLIT · XGBOOST · GROQ</p>
      </div>
      <div className="slide-footer">AI · FIN · RISK · 2026</div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [activeSlide, setActiveSlide] = useState(0);

  useEffect(() => {
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            const idx = SLIDES.findIndex(s => s.id === e.target.id);
            if (idx !== -1) setActiveSlide(idx);
          }
        });
      },
      { threshold: 0.5 }
    );
    SLIDES.forEach(s => {
      const el = document.getElementById(s.id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  const scrollTo = (id) => {
    document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
  };

  return (
    <>
      <Nav active={activeSlide} onDot={(id) => scrollTo(id)} />
      <SlideHero />
      <SlideProblem />
      <SlideSolution />
      <SlideData />
      <SlidePipeline />
      <SlideML />
      <SlideAPI />
      <SlideGroq />
      <SlideArch />
      <SlideDeploy />
      <SlideRoadmap />
      <SlideConclusion />
      <div className="scroll-hint">
        <span>SCROLL</span>
        <div className="scroll-arrow" />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<button onclick="exportToPPTX()" style="position:fixed; bottom:20px; right:20px; z-index:9999; background:var(--teal); color:var(--bg); padding:12px 24px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-family:var(--font-mono); box-shadow: 0 0 15px rgba(0,212,200,0.4);">📥 Export PPTX (Exact)</button>
<script>
async function exportToPPTX() {
    const btn = document.querySelector('button[onclick="exportToPPTX()"]');
    btn.innerText = "Generating... (Please wait)";
    btn.disabled = true;

    document.querySelectorAll('.animate').forEach(el => {
        el.style.animation = 'none';
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
    });

    let pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_16x9';

    const slides = document.querySelectorAll('.slide');
    const nav = document.querySelector('.nav');
    const scrollHint = document.querySelector('.scroll-hint');
    if(nav) nav.style.display = 'none';
    if(scrollHint) scrollHint.style.display = 'none';
    btn.style.display = 'none';

    for (let i = 0; i < slides.length; i++) {
        const slide = slides[i];
        
        const origWidth = slide.style.width;
        const origHeight = slide.style.height;
        const origMinHeight = slide.style.minHeight;
        const origPadding = slide.style.padding;
        
        slide.style.width = '1920px';
        slide.style.height = '1080px';
        slide.style.minHeight = '1080px';
        slide.style.padding = '120px 160px';

        const canvas = await html2canvas(slide, {
            width: 1920,
            height: 1080,
            scale: 2,
            backgroundColor: '#040508',
            windowWidth: 1920,
            windowHeight: 1080,
            logging: false
        });

        const imgData = canvas.toDataURL('image/png', 0.95);
        let pptxSlide = pptx.addSlide();
        pptxSlide.background = { color: '040508' };
        pptxSlide.addImage({ data: imgData, x: 0, y: 0, w: '100%', h: '100%' });

        slide.style.width = origWidth;
        slide.style.height = origHeight;
        slide.style.minHeight = origMinHeight;
        slide.style.padding = origPadding;
    }

    if(nav) nav.style.display = 'flex';
    if(scrollHint) scrollHint.style.display = 'flex';
    btn.style.display = 'block';

    pptx.writeFile({ fileName: "AI_Incidents_Financial_Services_Dark_Exact_EN.pptx" });
    btn.innerText = "📥 Export PPTX (Exact)";
    btn.disabled = false;
}
</script>
